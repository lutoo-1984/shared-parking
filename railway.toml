# ============================================================
# 共享停车位平台 - Railway 部署配置
# 强制使用 Dockerfile 构建（不使用 Railpack）
# ============================================================

[build]
  builder = "DOCKERFILE"
  dockerfile_path = "Dockerfile"

[deploy]
  healthcheck_path = "/api/"
  healthcheck_timeout = 30
  restart_policy_type = "on_failure"
  restart_policy_max_retries = 3
