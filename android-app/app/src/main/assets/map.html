<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>停车位地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; }
        #map { width: 100%; height: 100%; }
        .spot-marker {
            background: #4CAF50;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .spot-popup .title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .spot-popup .address {
            font-size: 12px;
            color: #666;
            margin-bottom: 4px;
        }
        .spot-popup .price {
            font-size: 13px;
            color: #4CAF50;
            font-weight: bold;
        }
        .leaflet-popup-content { margin: 8px 12px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([39.9042, 116.4074], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 18
        }).addTo(map);

        var defaultIcon = L.divIcon({
            className: 'spot-marker',
            html: 'P',
            iconSize: [32, 32],
            iconAnchor: [16, 16]
        });

        var spots = [];
        var markers = [];

        function setSpots(spotData) {
            spots = spotData;
            markers.forEach(function(m) { map.removeLayer(m); });
            markers = [];

            if (spots.length === 0) return;

            var bounds = L.latLngBounds();
            spots.forEach(function(s, i) {
                var marker = L.marker([s.lat, s.lng], { icon: defaultIcon })
                    .addTo(map)
                    .bindPopup(
                        '<div class="spot-popup">' +
                        '<div class="title">' + (s.title || '车位') + '</div>' +
                        '<div class="address">' + (s.address || '') + '</div>' +
                        '<div class="price">¥' + (s.price || '0').toFixed(2) + '/小时</div>' +
                        '</div>'
                    );
                markers.push(marker);
                bounds.extend([s.lat, s.lng]);
            });

            if (spots.length === 1) {
                map.setView([spots[0].lat, spots[0].lng], 15);
            } else {
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }

        // Android interface
        function updateSpotsFromAndroid(json) {
            try {
                var data = JSON.parse(json);
                setSpots(data);
            } catch(e) {}
        }
    </script>
</body>
</html>
