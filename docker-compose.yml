# ============================================================
# 共享停车位平台 - Docker Compose 生产部署
# 使用: docker compose up -d
# ============================================================
version: "3.8"

services:
  # ----- MySQL 数据库 -----
  mysql:
    image: mysql:8.0
    container_name: shared-parking-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_DATABASE:-shared_parking}
      MYSQL_USER: ${DB_USERNAME:-shared_parking}
      MYSQL_PASSWORD: ${DB_PASSWORD:-shared_parking_pass}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network

  # ----- PHP + Apache（主应用） -----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shared-parking-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      # 应用配置
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}

      # 数据库
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-shared_parking}
      DB_USERNAME: ${DB_USERNAME:-shared_parking}
      DB_PASSWORD: ${DB_PASSWORD:-shared_parking_pass}

      # JWT（生产环境务必修改）
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_random_secret_key}

      # 高德地图 Key
      AMAP_KEY: ${AMAP_KEY:-a3cd510ffc1871168cbee271105ad260}
    volumes:
      - app_uploads:/var/www/html/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  # ----- phpMyAdmin（可选管理工具）-----
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: shared-parking-pma
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      - mysql
    networks:
      - app-network
    profiles:
      - dev  # 仅在 dev profile 下启动

networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  app_uploads:
    driver: local
